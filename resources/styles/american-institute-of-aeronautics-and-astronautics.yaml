info:
  title: American Institute of Aeronautics and Astronautics
  description: A style for AIAA
  fields:
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/american-institute-of-aeronautics-and-astronautics
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Garrett Foster
      email: garrett.d.foster@gmail.com
      uri: http://sdoresearch.com
    links:
    - href: http://www.zotero.org/styles/american-institute-of-aeronautics-and-astronautics
      rel: self
    - href: http://www.zotero.org/styles/ieee
      rel: template
    - href: https://www.aiaa.org/publications/journals/reference-style-and-format
      rel: documentation
options:
  substitute: editor-translator-short
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  dates: long
  titles: journal-emphasis
  bibliography:
    separator: ", "
  punctuation-in-quote: true
citation:
  template:
    - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: always
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: volume
    - number: issue
      prefix: ", No. "
    - date: issued
      form: year
      overrides:
        article-magazine:
          suppress: true
    - number: pages
      overrides:
        article-journal:
          prefix: "pp. "
        chapter:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
        entry-encyclopedia:
          prefix: "pp. "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
      prefix: ". "
    - variable: publisher-place
  type-templates:
    paper-conference:
      - contributor: author
        form: long
        and: text
      - title: primary
        quote: true
      - title: parent-monograph
        prefix: "presented at the "
      - date: issued
        form: year
    webpage:
      - contributor: author
        form: long
        and: text
      - title: primary
        quote: true
        wrap: quotes
      - title: parent-serial
      - variable: publisher
      - variable: publisher-place
      - number: volume
      - number: issue
      - date: issued
        form: year
      - number: pages
        label-form: short
      - term: retrieved
        form: long
      - date: accessed
        form: year
      - variable: url
    patent:
      - contributor: author
        form: long
        and: text
      - title: primary
        quote: true
      - number: number
      - date: issued
        form: full