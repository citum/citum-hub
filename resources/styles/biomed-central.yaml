info:
  title: BioMed Central
  fields:
  - medicine
  - biology
  source:
    csl-id: http://www.zotero.org/styles/biomed-central
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Robert M Flight
      email: rflight79@gmail.com
    links:
    - href: http://www.zotero.org/styles/biomed-central
      rel: self
    - href: http://bmcbioinformatics.biomedcentral.com/submission-guidelines/preparing-your-manuscript/research-article
      rel: documentation
options:
  substitute:
    template:
      - editor
  processing: numeric
  contributors: numeric-compact
  dates: numeric
  page-range-format: minimal
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  type-templates:
    webpage:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - date: issued
        form: year
        suffix: ". "
      - variable: url
      - date: accessed
        form: month-day
        prefix: "Accessed "
      - date: accessed
        form: year
        prefix: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
      overrides:
        article-journal:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - number: volume
    - number: issue
      prefix: ":"
      overrides:
        article-magazine:
          suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
      prefix: ":"
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: publisher-place
    - variable: publisher
      prefix: ": "