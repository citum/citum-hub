info:
  title: Institute of Mathematics and its Applications
  fields:
  - math
  source:
    csl-id: http://www.zotero.org/styles/institute-of-mathematics-and-its-applications
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: 'Patrick '
      email: obrienpat86@gmail.com
    links:
    - href: http://www.zotero.org/styles/institute-of-mathematics-and-its-applications
      rel: self
    - href: http://www.zotero.org/styles/european-journal-of-neuroscience
      rel: template
    - href: https://academic.oup.com/teamat/pages/General_Instructions
      rel: documentation
options:
  substitute:
    template:
      - editor
      - translator
  contributors:
    display-as-sort: all
    initialize-with: .
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    and: symbol
    demote-non-dropping-particle: never
  dates: long
  titles: humanities
  page-range-format: expanded
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  options:
    contributors:
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
    - contributor: author
      form: short
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
    - date: issued
      form: year
      prefix: ", "
    - variable: locator
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: .
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            book:
              prefix: "on "
          name-order: family-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "