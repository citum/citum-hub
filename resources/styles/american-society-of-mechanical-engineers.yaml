info:
  title: American Society of Mechanical Engineers
  description: A style for the ASME's 23 journals
  fields:
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/american-society-of-mechanical-engineers
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Richard Karnesky
      email: karnesky+zotero@gmail.com
      uri: http://arc.nucapt.northwestern.edu/Richard_Karnesky
    links:
    - href: http://www.zotero.org/styles/american-society-of-mechanical-engineers
      rel: self
    - href: http://www.zotero.org/styles/ieee
      rel: template
    - href: https://www.asme.org/publications-submissions/journals/information-for-authors/journal-guidelines/references
      rel: documentation
options:
  substitute: editor-translator-short
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: short
  titles: journal-emphasis
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
      wrap: quotes
    - title: parent-monograph
    - title: parent-serial
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - variable: url
    - variable: publisher
    - number: pages
      overrides:
        article-journal:
          prefix: "pp. "
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
        entry-encyclopedia:
          prefix: "pp. "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
      prefix: ". "
    - variable: publisher-place