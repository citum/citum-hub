info:
  title: DIN 1505-2 (alphanumeric, Deutsch) - standard superseded by ISO-690
  description: "Style following DIN 1505-2, using the alphanumeric citation keys, for other media types on additional standards \n      Hinweise zur Benutzung: \n      * Zitieren von Gesetzen: \n        - hier müssen manuell §, Abs und S. zur Seitenangabe beim Zitieren eingetragen werden \n        - im Kurzbeleg wird der Kurztitel verwendet, dafür keine Autoren eintragen! \n        - als Jahresangabe wird 'Datum des Inkrafttretens' herangezogen, Verwenden nur bei Verweis auf nicht z.Z. gültige Gesetze, z.B. (idF. v. 12.12.1972) \n       * Zitieren von Normen und Standards - nicht vollständig nach DIN 1505\n        - Nutzen Sie den Typ 'Bericht' - als Abhilfe, da es keinen Typ 'Standard' gibt.\n        - als Autor die Kurzbezeichnung inkl. Nummer und Jahr eingeben (z.B. VDI 2222-1997), Vorname leer, Jahr leer\n        - als Titel den ausführlichen Titel bei Bedarf (z.B. VDI Richtlinie 2222 Blatt 1 - Konstruktionsmethodik - Methodisches Entwickeln von Lösungsprinzipien)"
  source:
    csl-id: http://www.zotero.org/styles/din-1505-2-alphanumeric
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sven Rothe
      email: mmoole@googlemail.com
    links:
    - href: http://www.zotero.org/styles/din-1505-2-alphanumeric
      rel: self
    - href: http://www.angst-vor-dem-leeren-blatt.de/docs/download/zitierrichtlinie_din_1505.pdf
      rel: documentation
    - href: http://www.bui.haw-hamburg.de/fileadmin/redaktion/diplom/Lorenzen__litverz.pdf
      rel: documentation
    - href: http://de.wikipedia.org/wiki/DIN_1505-2
      rel: documentation
    - href: http://forums.zotero.org/discussion/5239/1/first-letter-of-author-as-citation/
      rel: documentation
options:
  processing:
    label:
      preset: ams
      single-author-chars: 4
      et-al-min: 5
      et-al-marker: ""
  contributors:
    display-as-sort: all
    shorten:
      min: 9
      use-first: 8
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: " ; "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates:
    month: numeric
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  bibliography:
    separator: " : "
citation:
  template:
    - number: citation-label
    - variable: locator
      prefix: ", "
  wrap: brackets
  delimiter: ""
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      shorten:
        min: 9
        use-first: 8
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: " ; "
      delimiter-precedes-last: always
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: ": "
    - items:
        - contributor: editor
          form: verb
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - date: issued
      form: year
      prefix: ", "
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        article-journal:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
      prefix: ", "
    - variable: publisher-place