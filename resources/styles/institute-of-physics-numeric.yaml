info:
  title: Institute of Physics (numeric)
  fields:
  - physics
  source:
    csl-id: http://www.zotero.org/styles/institute-of-physics-numeric
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/institute-of-physics-numeric
      rel: self
    - href: http://authors.iop.org/atom/help.nsf/7765E7F03B07DE5080257020002E4D9B/$File/IOPWordGuidelines.pdf
      rel: documentation
options:
  substitute:
    template:
      - editor
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: " "
    shorten:
      min: 99
      use-first: 98
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
  titles: humanities
  page-range-format: minimal
  bibliography:
    separator: " "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: " "
      shorten:
        min: 99
        use-first: 98
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
      sort-separator: " "
  type-templates:
    legal-case:
      - term: anonymous
        form: short
        strip-periods: true
      - date: issued
        form: year
      - title: primary
      - term: volume
        form: short
        strip-periods: true
      - number: volume
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: volume
      overrides:
        legal-case:
          suppress: true
    - number: pages
      overrides:
        legal-case:
          suppress: true
    - variable: publisher-place
      overrides:
        article-journal:
          suppress: true
        legal-case:
          suppress: true
    - variable: publisher
      prefix: ": "
      overrides:
        article-journal:
          suppress: true
        legal-case:
          suppress: true