info:
  title: Hainan Medical University Journal Publisher
  fields:
  - medicine
  - biology
  source:
    csl-id: http://www.zotero.org/styles/hainan-medical-university-journal-publisher
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
      email: obrienpat86@gmail.com
    links:
    - href: http://www.zotero.org/styles/hainan-medical-university-journal-publisher
      rel: self
    - href: http://www.zotero.org/styles/european-journal-of-human-genetics
      rel: template
    - href: http://www.hnmujp.org/guide.html
      rel: documentation
options:
  substitute: editor-short
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 7
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    delimiter-precedes-et-al: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: short
  titles: humanities
  bibliography:
    entry-suffix: .
    separator: ". "
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      delimiter-precedes-et-al: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - variable: publisher
    - number: pages
      prefix: ", 2006: "
    - variable: publisher-place
      prefix: ": "
    - date: issued
      form: year
      prefix: ", "
      overrides:
        article-journal:
          suppress: true
        chapter:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - variable: url