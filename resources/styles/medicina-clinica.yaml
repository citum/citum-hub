info:
  title: Medicina Clínica (Español)
  description: Style for Medicina Clinica (and most Spanish Elsevier journals that follow an adapted Vancouver style)
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/medicina-clinica
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Laura Casares
      email: l.casares@elsevier.com
      uri: http://www.mendeley.com/profiles/laura-casares5/
    links:
    - href: http://www.zotero.org/styles/medicina-clinica
      rel: self
    - href: http://www.elsevier.es/es-revista-medicina-clinica-2-normas-publicacion#69000
      rel: documentation
options:
  substitute: editor-translator-long
  processing: numeric
  contributors: numeric-compact
  dates: long
  page-range-format: minimal
  bibliography:
    entry-suffix: .
    separator: ". "
citation:
  use-preset: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
      overrides:
        article-journal:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - number: volume
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
      prefix: ":"
  type-templates:
    patent:
      - number: citation-number
        suffix: .
      - contributor: author
        form: long
        sort-separator: " "
        shorten:
          min: 7
          use-first: 6
          and-others: et-al
          delimiter-precedes-last: always
      - title: primary
      - date: issued
        form: year
      - term: no-date
        form: short