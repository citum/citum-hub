info:
  title: American Society of Civil Engineers
  description: A style for American Society of Civil Engineers publications
  fields:
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/american-society-of-civil-engineers
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Rintze Zelle
      uri: http://twitter.com/rintzezelle
    links:
    - href: http://www.zotero.org/styles/american-society-of-civil-engineers
      rel: self
    - href: https://ascelibrary.org/author-center/journal#peer-review-process
      rel: documentation
options:
  processing: !custom
    sort:
      template:
        - key: author
        - key: year
    group:
      template: [author, year]
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  substitute: editor-short
  contributors:
    display-as-sort: first
    initialize-with: ". "
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  dates: long
  titles: humanities
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
  volume-pages-delimiter: colon
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
  template:
    - items:
        - contributor: author
          form: short
          shorten:
            min: 3
            use-first: 1
            and-others: et-al
            delimiter-precedes-last: contextual
          and: text
        - date: issued
          form: year
      delimiter: space
    - variable: locator
  wrap: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: first
      initialize-with: ". "
      delimiter-precedes-last: always
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: " "
    - title: primary
    - items:
        - contributor: editor
          form: verb
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - items:
        - number: volume
        - number: issue
          overrides:
            article-magazine:
              suppress: true
    - number: pages
      prefix: ": "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/