info:
  title: Frontiers medical journals
  description: Style for the Open Access Frontiers in ... Journals
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/frontiers-medical-journals
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Chris Forden
      email: cforden@comcast.net
    links:
    - href: http://www.zotero.org/styles/frontiers-medical-journals
      rel: self
    - href: http://www.zotero.org/styles/frontiers
      rel: template
    - href: https://www.frontiersin.org/guidelines/author-guidelines
      rel: documentation
options:
  substitute: editor-title-short
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 11
      use-first: 10
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
  titles: humanities
  bibliography:
    separator: ". "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - date: issued
      form: year
      wrap: parentheses
    - number: volume
      prefix: " "
    - number: issue
      prefix: ":"
      overrides:
        article-magazine:
          suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
      prefix: ":"
    - variable: doi
    - variable: url