info:
  title: Entomological Society of America
  fields:
  - biology
  source:
    csl-id: http://www.zotero.org/styles/entomological-society-of-america
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/entomological-society-of-america
      rel: self
    - href: http://www.zotero.org/styles/elsevier-harvard
      rel: template
    - href: http://www.entsoc.org/pubs/publish/style
      rel: documentation
options:
  substitute: editor-translator-title-long
  contributors: numeric-medium
  dates: numeric
  bibliography:
    hanging-indent: false
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      initialize-with: .
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
    - contributor: author
      form: short
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
    - date: issued
      form: year
      prefix: " "
      overrides:
        patent:
          suppress: true
        article-newspaper:
          suppress: true
    - variable: locator
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 3
    - date: issued
      form: year
      prefix: " "
      overrides:
        patent:
          suppress: true
        article-newspaper:
          suppress: true
    - title: primary
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
          shorten:
            min: 4
            use-first: 3
        - title: parent-monograph
    - title: parent-serial
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - variable: publisher
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        entry-encyclopedia:
          prefix: "pp. "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: publisher-place
    - variable: url