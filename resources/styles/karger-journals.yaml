info:
  title: Karger journals
  description: Vancouver style for Journals published by Karger
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/karger-journals
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/karger-journals
      rel: self
    - href: http://www.karger.com/Journal/Guidelines/223832#05
      rel: documentation
options:
  substitute:
    template:
      - editor
  processing: numeric
  contributors: numeric-compact
  dates: short
  page-range-format: minimal
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - date: issued
      form: year
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - number: pages
      prefix: ":"
    - variable: publisher-place
      overrides:
        article-journal:
          suppress: true
    - variable: publisher
      prefix: ": "
      overrides:
        article-journal:
          suppress: true
    - variable: doi
      prefix: "DOI: "
    - variable: url