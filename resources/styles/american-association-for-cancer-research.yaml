info:
  title: American Association for Cancer Research
  description: Parent style for AACR's journals
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/american-association-for-cancer-research
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/american-association-for-cancer-research
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence
      rel: template
    - href: http://www.aacrjournals.org/site/InstrAuthors/ifora.xhtml#references
      rel: documentation
options:
  substitute: editor-long
  processing: numeric
  contributors: numeric-compact
  dates: long
  page-range-format: minimal
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - date: issued
      form: year
      prefix: "; "
      overrides:
        article-journal:
          suppress: true
        webpage:
          suppress: true
        article-newspaper:
          suppress: true
        article-magazine:
          suppress: true
        dataset:
          suppress: true
    - number: volume
    - number: pages
      prefix: ":"
    - variable: url