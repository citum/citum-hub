info:
  title: African Online Scientific Information Systems (author-date/Harvard)
  description: Style for AOSIS Publishing's Harvard style as per 13 April 2017.
  source:
    csl-id: http://www.zotero.org/styles/african-online-scientific-information-systems-harvard
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien, PhD
      email: obrienpat86@gmail.com
    links:
    - href: http://www.zotero.org/styles/african-online-scientific-information-systems-harvard
      rel: self
    - href: http://www.zotero.org/styles/myrmecological-news
      rel: template
    - href: https://books.aosis.co.za/index.php/ob/submission-guideline
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: year
          ascending: true
        - key: author
          ascending: true
    group:
      template:
        - year
        - author
    disambiguate:
      names: true
      add-givenname: true
      year-suffix: true
  contributors:
    display-as-sort: all
    initialize-with: .
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    sort-separator: ", "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ", "
citation:
  options:
    contributors:
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: never
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 1
    - date: issued
      form: year
      prefix: " "
    - variable: locator
      prefix: " "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: .
      delimiter: ", "
      delimiter-precedes-last: never
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
      emph: true
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - variable: publisher-place
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
    - variable: publisher
  sort: author-date-title