info:
  title: MHRA Style Guide 4th edition (notes, place of publication, without URLs)
  description: MHRA source citations, notes system, with place of publication (MHRA 7.3), without URLs
  fields:
  - history
  - humanities
  - linguistics
  - literature
  - philosophy
  - theology
  source:
    csl-id: http://www.zotero.org/styles/mhra-notes-publisher-place-no-url
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/mhra-notes-publisher-place-no-url
      rel: self
    - href: http://www.zotero.org/styles/mhra-notes
      rel: template
    - href: https://www.mhra.org.uk/style/
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template: []
    overrides:
      standard: []
      software webpage: []
      song: []
      manuscript: []
  processing: note
  contributors:
    and: text
    delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: minimal-two
  bibliography:
    subsequent-author-substitute: ——
    subsequent-author-substitute-rule: partial-first
    hanging-indent: true
    separator: ": "
citation:
  options:
    contributors:
      delimiter-precedes-last: contextual
  subsequent:
    options:
      contributors:
        name-form: family-only
    template:
      - contributor: author
        form: short
      - title: primary
        form: short
        wrap: quotes
      - variable: locator
        prefix: ", "
  template:
    - contributor: author
      form: long
      name-order: given-first
      shorten:
        min: 8
        use-first: 1
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: given-first
      shorten:
        min: 4
        use-first: 1
    - variable: publisher-place
      prefix: " ("
    - variable: publisher
      prefix: ": "
    - number: volume
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - number: pages
      overrides:
        article-journal:
          prefix: "pp. "
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
        entry-encyclopedia:
          prefix: "pp. "
    - number: number
      prefix: ", Patent "
      overrides:
        patent:
          suppress: false
        default:
          suppress: true
    - items:
        - date: issued
          form: month-day
          prefix: ", issued "
        - date: issued
          form: year
          prefix: ", "
      delimiter: none
      overrides:
        patent:
          suppress: false
        default:
          suppress: true
    - items:
        - date: issued
          form: month-day
        - date: issued
          form: year
          prefix: ", "
      delimiter: none
      prefix: ", "
      overrides:
        interview:
          suppress: false
        default:
          suppress: true
    - variable: medium
      prefix: ", "
      overrides:
        interview:
          suppress: false
        default:
          suppress: true
    - contributor: interviewer
      form: long
      prefix: ", interview by "
      overrides:
        interview:
          suppress: false
        default:
          suppress: true
  suffix: .
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 1
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: given-first
      shorten:
        min: 4
        use-first: 1
    - variable: publisher-place
      prefix: " ("
    - variable: publisher
      prefix: ": "
    - number: volume
    - date: issued
      form: year
      prefix: " "
      overrides:
        patent:
          suppress: true
        dataset:
          suppress: true
        article-newspaper:
          suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        article-journal:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
        entry-encyclopedia:
          prefix: "pp. "
