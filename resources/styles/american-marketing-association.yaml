info:
  title: American Marketing Association
  description: AMA Reference List Style published by the American Marketing Association
  fields:
  - communications
  source:
    csl-id: http://www.zotero.org/styles/american-marketing-association
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/american-marketing-association
      rel: self
    - href: https://www.ama.org/submission-guidelines-journal-of-marketing/
      rel: documentation
    - href: https://www.ama.org/american-marketing-association-journals-reference-style-examples/
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: author
          ascending: true
        - key: year
          ascending: true
    group:
      template:
        - author
        - year
    disambiguate:
      names: true
      add-givenname: true
      year-suffix: true
  contributors:
    display-as-sort: first
    initialize-with: ". "
    shorten:
      min: 4
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: chicago
  bibliography:
    subsequent-author-substitute-rule: partial-each
    hanging-indent: true
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  options:
    contributors:
      initialize-with: ". "
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
    - contributor: author
      form: short
      name-order: family-first
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
    - date: issued
      form: year
      prefix: ""
    - variable: locator
      prefix: ", "
  wrap: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: first
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher-place
    - contributor: editor
      form: verb
      name-order: given-first
    - variable: publisher
      prefix: ": "
    - items:
        - number: volume
        - number: issue
    - number: pages
  sort: author-date-title
