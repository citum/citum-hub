info:
  title: SAGE - NLM/Vancouver
  description: Vancouver superscript style modified to italicize journal names strip periods for use in SAGE journals
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/sage-vancouver
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Michael Berkowitz
      email: mberkowi@gmu.edu
    links:
    - href: http://www.zotero.org/styles/sage-vancouver
      rel: self
    - href: http://www.uk.sagepub.com/repository/binaries/pdf/SAGE_Vancouver_reference_style.pdf
      rel: documentation
options:
  substitute: editor-short
  processing: numeric
  contributors: numeric-medium
  dates: long
  titles: humanities
  bibliography:
    entry-suffix: .
    separator: ". "
citation:
  use-preset: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
          shorten:
            min: 4
            use-first: 3
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - date: issued
      form: year
      prefix: ", "
      overrides:
        article-journal:
          suppress: true
        entry-encyclopedia:
          suppress: true
        broadcast:
          suppress: true
        personal_communication:
          suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
      prefix: ", "
    - variable: publisher-place
    - variable: url