info:
  title: Taylor & Francis - National Library of Medicine (citation-sequence, brackets)
  description: 'NLM style as used by T & F : Brackets, no et-al, no issue numbers, locators in text possible as per Version 2.2 from 30 May 2023.'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/taylor-and-francis-national-library-of-medicine
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/taylor-and-francis-national-library-of-medicine
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence-brackets
      rel: template
    - href: https://files.taylorandfrancis.com/tf_NLM.pdf
      rel: documentation
options:
  substitute: editor-long
  processing: numeric
  contributors: numeric-medium
  dates: long
  page-range-format: expanded
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  template:
    - number: citation-number
    - variable: locator
      prefix: ","
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
          shorten:
            min: 4
            use-first: 3
        - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
      overrides:
        article-journal:
          suppress: true
        webpage:
          suppress: true
        article-newspaper:
          suppress: true
        article-magazine:
          suppress: true
        dataset:
          suppress: true
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        entry-encyclopedia:
          prefix: "pp. "
    - variable: url