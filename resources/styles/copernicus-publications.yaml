info:
  title: Copernicus Publications
  description: The Copernicus generic style
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/copernicus-publications
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      email: julian.onions@gmail.com
    links:
    - href: http://www.zotero.org/styles/copernicus-publications
      rel: self
    - href: https://publications.copernicus.org/for_authors/manuscript_preparation.html
      rel: documentation
options:
  processing: !custom
    sort:
      template:
        - key: author
        - key: year
    group:
      template: [author, year]
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  substitute: editor-short
  contributors:
    display-as-sort: all
    initialize-with: ". "
    shorten:
      min: 100
      use-first: 99
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    demote-non-dropping-particle: sort-only
  dates: long
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
  template:
    - contributor: author
      form: short
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      and: text
    - date: issued
      form: year
    - variable: locator
  wrap: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ". "
      shorten:
        min: 100
        use-first: 99
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: ": "
    - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      overrides:
        article-magazine:
          suppress: true
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: publisher-place
    - variable: publisher
    - number: pages
    - date: issued
      form: year