info:
  title: Springer - Humanities (author-date)
  description: Style for Springer's humanities journals - the journals do look slightly different from each other, but this should work quite closely
  fields:
  - humanities
  source:
    csl-id: http://www.zotero.org/styles/springer-humanities-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/springer-humanities-author-date
      rel: self
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  processing: !custom
    sort:
      template:
        - key: author
        - key: year
    group:
      template: [author, year]
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  substitute: editor-translator-short
  contributors:
    display-as-sort: first
    initialize-with: ". "
    shorten:
      min: 11
      use-first: 7
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  titles: humanities
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
  template:
    - items:
        - contributor: author
          form: short
          shorten:
            min: 3
            use-first: 1
            and-others: et-al
            delimiter-precedes-last: contextual
          and: text
        - date: issued
          form: year
      delimiter: space
    - variable: locator
  wrap: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: first
      shorten:
        min: 11
        use-first: 7
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
    - items:
        - contributor: editor
          form: verb
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: issue
      prefix: ": "
      overrides:
        article-magazine:
          suppress: true
    - number: pages
      prefix: ": "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/