info:
  title: Springer - NLM/Vancouver (citation-sequence, brackets)
  description: Based on the document "Key Style Points 2.0 І December 2024".
  source:
    csl-id: http://www.zotero.org/styles/springer-vancouver-brackets
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-vancouver-brackets
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence
      rel: template
    - href: https://www.springer.com/gp/authors-editors/book-authors-editors/your-publication-journey/manuscript-preparation
      rel: documentation
    - href: https://dam.springernature.com/file/1iVex7Gr46Q8xLzdF9RNhT/*/Key+Style+Points_Dec_24.pdf?authcred=Q29weVVSTDpDMHB5X1VSTA==
      rel: documentation
options:
  substitute: standard
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ''
    delimiter: ', '
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ' '
  dates: short
  titles: scientific
  page-range-format: minimal
  bibliography:
    entry-suffix: .
    separator: '. '
  punctuation-in-quote: true

citation:
  use-preset: numeric-citation
  wrap: brackets
  integral:
    template:
      - contributor: author
        form: short
        shorten:
          min: 3
          use-first: 1
          and-others: et-al
          delimiter-precedes-last: contextual
        and: text
      - number: citation-number
        wrap: brackets
    delimiter: " "
  multi-cite-delimiter: ","
  delimiter: ""

bibliography:
  type-templates:
    article-journal:
      - contributor: author
        form: long
        shorten:
          min: 7
          use-first: 6
          and-others: et-al
          delimiter-precedes-last: always
      - title: primary
      - title: parent-serial
      - items:
          - variable: publisher-place
            suffix: ': '
          - variable: publisher
            suffix: '; '
          - date: issued
            form: year
            suffix: ';'
          - number: volume
          - number: pages
            prefix: ':'
        delimiter: none
      - variable: doi
        prefix: '. https://doi.org/'

    chapter:
      - contributor: author
        form: long
      - title: primary
      - items:
          - contributor: editor
            form: long
            label: { term: editor, form: long, placement: suffix }
          - title: parent-monograph
        delimiter: '. '
        prefix: 'In: '
      - variable: publisher
        suffix: '; '
      - date: issued
        form: year
      - number: pages
        prefix: '. p. '

    book:
      - contributor: author
        form: long
      - contributor: editor
        form: long
        label: { term: editor, form: long, placement: suffix }
      - title: primary
      - number: edition
      - variable: publisher-place
        suffix: ': '
      - variable: publisher
        suffix: '; '
      - date: issued
        form: year

    thesis:
      - contributor: author
        form: long
      - items:
          - title: primary
          - variable: genre
            wrap: brackets
        delimiter: ' '
      - variable: publisher
        suffix: '; '
      - date: issued
        form: year

    paper-conference:
      - contributor: author
        form: long
      - title: primary
      - title: parent-monograph
      - date: issued
        form: year
      - number: pages
        prefix: 'p. '

    webpage:
      - contributor: author
        form: long
      - title: primary
      - date: issued
        form: year
      - date: accessed
        form: year-month-day
        prefix: '[cited '
        suffix: ']. '
      - variable: url
      - date: accessed
        form: year-month-day
        prefix: '. Accessed '

    article-newspaper:
      - contributor: author
        form: long
      - title: primary
      - title: parent-serial
      - items:
          - date: issued
            form: year
          - date: issued
            form: month-day
            prefix: ' '
        delimiter: none
        suffix: ';'

    article-magazine:
      - contributor: author
        form: long
      - title: primary
      - title: parent-serial
      - items:
        - date: issued
          form: year
          suffix: ' '
        - date: issued
          form: month-day
          suffix: ';'
        - number: volume
        - number: pages
          prefix: ':'
        delimiter: none

    entry-encyclopedia:
      - contributor: author
        form: long
      - title: primary
      - title: parent-serial
      - variable: publisher
        suffix: '; '
      - date: issued
        form: year
      - number: pages
        prefix: '. p. '

    dataset:
      - contributor: author
        form: long
      - title: primary
      - variable: publisher
        suffix: '; '
      - date: issued
        form: year
      - date: accessed
        form: year-month-day
        prefix: '[cited '
        suffix: ']. '
      - variable: url
      - date: accessed
        form: year-month-day
        prefix: '. Accessed '

    legal-case:
      - title: primary
      - variable: reporter
      - date: issued
        form: year
      - number: pages
        prefix: '. p. '

    interview:
      - contributor: author
        form: long
      - title: primary
      - date: issued
        form: year
      - variable: url

    report:
      - contributor: author
        form: long
      - title: primary
      - contributor: editor
        form: long
        label: { term: editor, form: long, placement: suffix }
      - variable: publisher-place
        suffix: ': '
      - variable: publisher
        suffix: '; '
      - date: issued
        form: year


  template:
    - contributor: author
      form: long
    - title: primary
    - title: parent-serial
    - variable: publisher-place
      suffix: ': '
    - variable: publisher
      suffix: '; '
    - date: issued
      form: year
    - number: volume
      prefix: ';'
    - number: pages
      prefix: ':'
    - variable: doi
      prefix: '. https://doi.org/'