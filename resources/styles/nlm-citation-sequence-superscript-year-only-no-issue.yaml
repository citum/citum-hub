info:
  title: 'NLM Style Guide (Vancouver): Citing Medicine 2nd edition (citation-sequence, superscript, year-only dates, no issue numbers)'
  description: 'Citing Medicine: The NLM Style Guide for Authors, Editors, and Publishers, 2nd edition (2015), based on ANSI/NISO Z39.29-2005 (R2010); citation-sequence system, with superscripted in-text indicators, year-only dates, and no issue numbers.'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/nlm-citation-sequence-superscript-year-only-no-issue
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/nlm-citation-sequence-superscript-year-only-no-issue
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence-superscript
      rel: template
    - href: https://www.nlm.nih.gov/citingmedicine
      rel: documentation
    - href: https://www.nlm.nih.gov/bsd/uniform_requirements.html
      rel: documentation
    - href: https://www.icmje.org/recommendations/
      rel: documentation
options:
  substitute:
    contributor-role-form: long
    template:
      - editor
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 7
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  page-range-format: minimal
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  template:
    - number: citation-number
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
      overrides:
        article-journal:
          suppress: true
        webpage:
          suppress: true
        article-newspaper:
          suppress: true
        article-magazine:
          suppress: true
        dataset:
          suppress: true
    - number: volume
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: url
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        entry-encyclopedia:
          prefix: "pp. "
      prefix: ":"