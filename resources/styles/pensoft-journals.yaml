info:
  title: Pensoft Journals
  description: The Pensoft Journals style
  source:
    csl-id: http://www.zotero.org/styles/pensoft-journals
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Brian Stucky
      email: stuckyb@colorado.edu
    - name: Teodor Georgiev
      email: t.georgiev@pensoft.net
    links:
    - href: http://www.zotero.org/styles/pensoft-journals
      rel: self
    - href: http://www.zotero.org/styles/zootaxa
      rel: template
    - href: https://zookeys.pensoft.net/about#CitationsandReferences
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: year
          ascending: true
        - key: author
          ascending: true
    group:
      template:
        - year
        - author
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 5
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    and: none
    delimiter-precedes-last: always
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  bibliography:
    hanging-indent: true
    entry-suffix: " "
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: " "
      delimiter-precedes-last: never
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
    - date: issued
      form: year
      prefix: " "
    - variable: locator
      prefix: " "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      delimiter-precedes-last: never
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ": "
      overrides:
        article-magazine:
          suppress: true
    - variable: publisher
    - number: pages
      prefix: ", "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: publisher-place
      prefix: ", "
    - variable: url
  type-templates:
    legal_case:
      - contributor: author
        form: long
        sort-separator: " "
      - date: issued
        form: year
        wrap: parentheses
      - number: volume
        suppress: true
      - title: parent-serial
      - title: primary
      - variable: authority
      - number: edition
      - term: edition
        form: short
      - contributor: editor
        form: long
        delimiter: ", "
        sort-separator: " "
      - variable: genre
      - variable: publisher
      - number: pages
        prefix: " "
        suffix: pp.
        suppress: true
      - variable: doi
        prefix: https://doi.org/
  sort: author-date-title