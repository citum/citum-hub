info:
  title: 'CSE Manual: Scientific Style and Format 9th edition (name-year)'
  description: 'Council of Science Editors style, 9th edition, name-year system: author-date in text, sorted alphabetically.'
  fields:
  - biology
  - botany
  - chemistry
  - geology
  - medicine
  - science
  - zoology
  source:
    csl-id: http://www.zotero.org/styles/cse-name-year
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
    links:
    - href: http://www.zotero.org/styles/cse-name-year
      rel: self
    - href: http://www.zotero.org/styles/cse-citation-sequence
      rel: template
    - href: https://www.csemanual.org/Tools/CSE-Citation-Quick-Guide.html
      rel: documentation
options:
  substitute: editor-translator-title-long
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 5
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: numeric
  bibliography:
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      initialize-with: .
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
    - date: issued
      form: year
      prefix: " "
      overrides:
        article-newspaper:
          suppress: true
        patent:
          suppress: true
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 5
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 1
    - date: issued
      form: year
      prefix: " "
    - title: primary
      overrides:
        webpage:
          suppress: true
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - variable: publisher
    - number: pages
      prefix: "; p "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: url