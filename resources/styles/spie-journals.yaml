info:
  title: SPIE journals
  description: |-
    Designed for SPIE journals, based on information at http://spie.org/x85036.xml and sample .docx manuscript given there (http://spie.org/Documents/Publications/Journals/journal%20Word%20template.doc). The latter probably originated from the style for e-journals (which was previously available at http://spie.org/x3658.xml), and thus slightly contradicts former requirements. The differences are:
        1) style on the web page requires using et al., when there are more than three authors - we follow this rule.
        2) style in the sample manuscript asks to add DOI if available, while the style on the web page says nothing about it - we do include DOI (this should not harm in all cases).
        Also previous versions of this style were based on more detailed instructions for SPIE e-journals (including larger number of document types). Those details are present in the current version as well, but no more supported by a documented style.
  fields:
  - physics
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/spie-journals
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Yurkin Maxim
      email: yurkin@gmail.com
      uri: http://sites.google.com/site/yurkin/
    links:
    - href: http://www.zotero.org/styles/spie-journals
      rel: self
    - href: http://spie.org/x85036.xml
      rel: documentation
options:
  substitute: editor-translator-short
  processing: numeric
  contributors:
    initialize-with: ". "
    shorten:
      min: 4
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    demote-non-dropping-particle: sort-only
  dates: long
  titles:
    monograph:
      emph: true
  page-range-format: expanded
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      initialize-with: ". "
      shorten:
        min: 4
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
    - contributor: author
      form: long
      overrides:
        personal_communication:
          prefix: "pp. "
      name-order: given-first
      shorten:
        min: 8
        use-first: 1
    - title: primary
      wrap: quotes
      overrides:
        interview:
          suppress: true
    - title: parent-monograph
    - title: parent-serial
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
        entry-encyclopedia:
          prefix: "pp. "
    - variable: publisher
    - variable: publisher-place
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - variable: doi
      prefix: " ["
  type-templates:
    webpage:
      - number: citation-number
        suffix: .
      - contributor: author
        form: long
        shorten:
          min: 4
          use-first: 1
          and-others: et-al
          delimiter-precedes-last: contextual
        and: text
      - title: primary
        quote: true
        wrap: quotes
      - date: issued
        form: year
      - variable: url
        prefix: <
        suffix: ">"
      - date: accessed
        form: year
        prefix: " (accessed "
        suffix: )