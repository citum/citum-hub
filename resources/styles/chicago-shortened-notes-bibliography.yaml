# yaml-language-server: $schema=./citum.schema.json
preset: chicago-notes-18th
info:
  title: Chicago Manual of Style 18th edition (shortened notes and bibliography)
  description: Chicago-style source citations (with Bluebook for legal citations), shortened author-title notes and bibliography system
  fields:
  - anthropology
  - communications
  - geography
  - history
  - humanities
  - law
  - linguistics
  - literature
  - philosophy
  - science
  - sociology
  - theology
  source:
    csl-id: http://www.zotero.org/styles/chicago-shortened-notes-bibliography
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/chicago-shortened-notes-bibliography
      rel: self
    - href: http://www.zotero.org/styles/chicago-notes-bibliography
      rel: template
    - href: https://www.chicagomanualofstyle.org/
      rel: documentation
  short-name: "Chicago Shortened Notes"
  edition: "18th edition"
  default-locale: en-US
options:
  locale-override: en-US-chicago
  processing: note
  contributors:
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates: long
  titles: humanities
  page-range-format: chicago16
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  ibid:
    note-start-text-case: capitalize-first
    suffix: ""
    delimiter: ", "
    template:
      - term: ibid
      - variable: locator
        suffix: .
  template:
    - contributor: author
      form: short
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
    - title: primary
      prefix: ", "
    - variable: locator
      prefix: ", "
  suffix: .
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
  type-templates:
    # Personal communications only appear in bibliography if reader can retrieve
    # them (CMOS18 14.13, 14.111). Inaccessible items are in-text only.
    personal-communication: []
    # Patent entries: author, title, then "Patent [number], issued [full-date]"
    # (CMOS18 14.158).
    patent:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - items:
          - term: patent
            suffix: " "
          - number: number
          - date: issued
            form: full
            prefix: ", issued "
        delimiter: none
        prefix: ". "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
    - items:
        - contributor: editor
          form: verb
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - date: issued
      form: year
      prefix: ", "
    - number: pages
      prefix: ": "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: url
