info:
  title: Annual Reviews (author-date)
  source:
    csl-id: http://www.zotero.org/styles/annual-reviews-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Michael Berkowitz
      email: mberkowi@gmu.edu
    links:
    - href: http://www.zotero.org/styles/annual-reviews-author-date
      rel: self
    - href: http://www.zotero.org/styles/annual-reviews-alphabetical
      rel: template
    - href: http://www.annualreviews.org/page/authors/author-instructions/preparing/handbooks
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: author
          ascending: true
        - key: year
          ascending: true
    group:
      template:
        - author
        - year
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 7
      use-first: 5
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: never
    sort-separator: " "
  dates:
    month: short
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: chicago
  bibliography:
    hanging-indent: true
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
    - date: issued
      form: year
      prefix: " "
    - variable: locator
      prefix: " "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 5
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 5
    - date: issued
      form: year
      prefix: " "
    - title: primary
    - items:
        - contributor: editor
          form: verb
          overrides:
            book:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides:
            article-magazine:
              suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
      prefix: ":"
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
  sort: author-date-title