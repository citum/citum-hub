info:
  title: The Company of Biologists
  description: Style used by the journals published by The Company of Biologists.
  fields:
  - biology
  source:
    csl-id: http://www.zotero.org/styles/the-company-of-biologists
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Gal Haspel
      email: gal.haspel@gmail.com
    links:
    - href: http://www.zotero.org/styles/the-company-of-biologists
      rel: self
    - href: http://jeb.biologists.org/site/author/manuscript_preparation.xhtml#references
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - title
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: author
          ascending: true
        - key: author
          ascending: true
        - key: author
          ascending: true
        - key: year
          ascending: true
    group:
      template:
        - author
        - year
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    initialize-with: ". "
    shorten:
      min: 11
      use-first: 10
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: never
    sort-separator: ", "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles: journal-emphasis
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
    - date: issued
      form: year
      prefix: ", "
    - variable: locator
      prefix: " "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ". "
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
    - items:
        - contributor: editor
          form: verb
          name-order: family-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
      prefix: ", "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
  sort: author-date-title