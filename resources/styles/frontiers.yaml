info:
  title: Frontiers journals
  description: Style for the Open Access Frontiers in ... Journals
  source:
    csl-id: http://www.zotero.org/styles/frontiers
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/frontiers
      rel: self
    - href: https://www.frontiersin.org/guidelines/author-guidelines
      rel: documentation
options:
  processing: !custom
    sort:
      template:
        - key: author
        - key: year
    group:
      template: [author, year]
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  substitute: editor-title-short
  contributors:
    display-as-sort: all
    initialize-with: ". "
    shorten:
      min: 7
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: never
    sort-separator: ", "
  dates: numeric
  titles: humanities
  bibliography:
    hanging-indent: true
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
  template:
    - contributor: author
      form: short
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      and: text
    - date: issued
      form: year
    - variable: locator
  wrap: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ". "
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
    - items:
        - contributor: editor
          form: verb
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: issue
      prefix: ", "
      overrides:
        article-magazine:
          suppress: true
    - variable: publisher
    - number: pages
      prefix: "), "
    - variable: doi
    - variable: publisher-place
    - variable: url