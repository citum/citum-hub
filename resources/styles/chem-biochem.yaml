info:
  title: ACS Biochemistry (Compound)
  description: >
    Style for the ACS journal Biochemistry with compound citation support.
    Distinctive from base ACS: year appears in parentheses immediately
    after author list, before the title. Superscript citation numbers
    without brackets.
  fields:
  - chemistry
  - biology
  source:
    csl-id: http://www.zotero.org/styles/biochemistry
    adapted-by: citum-create

    license: http://creativecommons.org/licenses/by-sa/3.0/
    links:
    - href: http://www.zotero.org/styles/biochemistry
      rel: self
    - href: http://pubs.acs.org/paragonplus/submission/bichaw/bichaw_authguide.pdf
      rel: documentation
options:
  processing: numeric
  contributors:
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  bibliography:
    entry-suffix: .
    separator: ". "
    compound-numeric:
      collapse-subentries: true
      sub-label: alphabetic
      sub-label-suffix: ")"
      sub-delimiter: " "
      subentry: true
citation:
  use-preset: numeric-citation
  wrap: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: always
  template:
    - number: citation-number
      wrap: parentheses
      suffix: " "
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
      suffix: "."
    - title: primary
      prefix: " "
      overrides:
        article-journal:
          suffix: "."
        report:
          prefix: " "
    - title: parent-serial
      emph: true
      prefix: " "
      overrides:
        book:
          suppress: true
        chapter:
          suppress: true
        article-journal:
          prefix: " "
    - title: parent-monograph
      emph: true
      prefix: ", in "
    - contributor: editor
      form: short
      name-order: given-first
      prefix: " ("
      suffix: ")"
    - number: edition
      prefix: ", "
    - variable: publisher
      prefix: "; "
      overrides:
        article-journal:
          suppress: true
        thesis:
          suppress: true
    - variable: publisher-place
      prefix: ", "
      overrides:
        article-journal:
          suppress: true
        thesis:
          suppress: true
    - number: volume
      emph: true
      prefix: " "
    - number: pages
      prefix: ", "
  type-templates:
    report:
      - number: citation-number
        wrap: parentheses
        suffix: " "
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
        prefix: " "
      - variable: genre
        prefix: ", "
      - variable: publisher-place
        prefix: ", "
      - date: issued
        form: year
        prefix: ", "
    thesis:
      - number: citation-number
        wrap: parentheses
        suffix: " "
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
        prefix: " "
      - variable: genre
        prefix: ", "
      - date: issued
        form: year
        prefix: ", "
