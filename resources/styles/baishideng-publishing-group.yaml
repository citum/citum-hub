info:
  title: Baishideng Publishing Group
  source:
    csl-id: http://www.zotero.org/styles/baishideng-publishing-group
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
    links:
    - href: http://www.zotero.org/styles/baishideng-publishing-group
      rel: self
    - href: http://www.zotero.org/styles/hypertension-research
      rel: template
    - href: https://www.wjgnet.com/1948-5182/
      rel: documentation
    - href: https://bsdwebstorage.blob.core.windows.net/bpggerinfo/Guidelines_for_Manuscript_Preparation_and_Submission-Basic_Study.pdf
      rel: documentation
    - href: https://www.wjgnet.com/bpg/GerInfo/218
      rel: documentation
options:
  substitute: editor-short
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 100
      use-first: 99
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
  titles: journal-emphasis
  bibliography:
    separator: ". "
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 100
        use-first: 99
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: issue
      prefix: ": "
      overrides:
        article-magazine:
          suppress: true
    - number: pages
      prefix: ": "
    - date: issued
      form: year
      overrides:
        article-journal:
          suppress: true
        book:
          suppress: true
        chapter:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
        motion_picture:
          suppress: true
    - variable: doi
      prefix: . [
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: url