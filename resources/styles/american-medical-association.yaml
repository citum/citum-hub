info:
  title: American Medical Association Manual of Style 11th edition
  description: 'AMA Manual of Style: A Guide for Authors and Editors (11th ed.)'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/american-medical-association
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      uri: https://orcid.org/0000-0001-5192-6856
    links:
    - href: http://www.zotero.org/styles/american-medical-association
      rel: self
    - href: http://www.zotero.org/styles/american-medical-association-10th-edition
      rel: template
    - href: https://academic.oup.com/amamanualofstyle
      rel: documentation
  short-name: "AMA"
  edition: "11th edition"
options:
  locators:
    strip-label-periods: true
  substitute: editor-short
  processing: numeric
  contributors:
    initialize-with: ""
    sort-separator: " "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    display-as-sort: first
  dates: short
  titles: humanities
  page-range-format: expanded
  bibliography:
    separator: ". "
  punctuation-in-quote: true
citation:
  template:
    - items:
        - number: citation-number
        - variable: locator
          wrap: parentheses
      delimiter: none
  multi-cite-delimiter: ","
bibliography:
  type-templates:
    [article-journal, article-magazine]:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 4
          use-first: 3
          and-others: et-al
      - title: primary
      - title: parent-serial
      - items:
          - date: issued
            form: year
            suffix: ";"
          - number: volume
          - number: issue
            wrap: parentheses
          - number: pages
            prefix: ":"
        delimiter: none
      - variable: doi
        prefix: " doi:"
        overrides:
          article-magazine:
            suppress: true
    [book, report, thesis]:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - variable: genre
        overrides:
          [book, report]:
            suppress: true
      - number: edition
        overrides:
          [report, thesis]:
            suppress: true
      - variable: publisher
        suffix: "; "
      - date: issued
        form: year
    [chapter, paper-conference]:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - items:
          - term: in
            suffix: ": "
          - contributor: editor
            form: long
            name-order: family-first
            label: { term: editor, form: long, placement: suffix }
          - title: parent-monograph
        delimiter: " "
      - variable: publisher
        suffix: "; "
        overrides:
          paper-conference:
            suppress: true
      - items:
          - date: issued
            form: year
          - number: pages
            prefix: ":"
        delimiter: none
    webpage:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - date: issued
        form: year
      - date: accessed
        form: month-day
        prefix: "Accessed "
      - date: accessed
        form: year
        prefix: ", "
        suffix: ". "
      - variable: url
    article-newspaper:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - title: parent-serial
      - date: issued
        form: month-day
      - date: issued
        form: year
        prefix: ", "
    entry-encyclopedia:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - term: in
        suffix: ": "
      - title: parent-serial
      - term: volume
        form: short
        suffix: " "
      - number: volume
      - variable: publisher
        suffix: "; "
      - items:
          - date: issued
            form: year
          - number: pages
            prefix: ":"
        delimiter: none
    dataset:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - term: online
        prefix: "Published "
        suffix: " "
      - date: issued
        form: year
        suffix: ". "
      - date: accessed
        form: month-day
        prefix: "Accessed "
      - date: accessed
        form: year
        prefix: ", "
        suffix: ". "
      - variable: url
    legal-case:
      - title: primary
      - items:
          - variable: reporter
          - number: volume
          - number: pages
            prefix: ", "
        delimiter: " "
      - items:
          - variable: authority
          - date: issued
            form: year
        delimiter: " "
        wrap: parentheses
    patent:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - items:
          - term: online
            prefix: "Published "
            suffix: " "
          - date: issued
            form: month-day
          - date: issued
            form: year
            prefix: ", "
        delimiter: none
      - variable: number
        prefix: ":"
    motion-picture:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - date: issued
        form: year
    broadcast:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - title: parent-serial
      - items:
          - term: online
            prefix: "Published "
            suffix: " "
          - date: issued
            form: month-day
          - date: issued
            form: year
            prefix: ", "
          - variable: number
            prefix: ":"
        delimiter: none
    [interview, personal-communication]:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - items:
          - term: online
            prefix: "Published "
            suffix: " "
          - date: issued
            form: month-day
          - date: issued
            form: year
            prefix: ", "
        delimiter: none
      - variable: url
        overrides:
          personal-communication:
            suppress: true
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - variable: publisher
      suffix: "; "
    - date: issued
      form: year