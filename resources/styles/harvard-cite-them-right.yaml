info:
  title: Cite Them Right 12th edition (author-date/Harvard)
  description: Harvard according to Cite Them Right, 11th edition.
  source:
    csl-id: http://www.zotero.org/styles/harvard-cite-them-right
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
    links:
    - href: http://www.zotero.org/styles/harvard-cite-them-right
      rel: self
    - href: http://www.zotero.org/styles/harvard-cite-them-right-11th-edition
      rel: template
    - href: http://www.citethemrightonline.com/
      rel: documentation
  short-name: "Harvard"
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
    overrides:
      article-newspaper article-magazine article-journal: []
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: year
          ascending: true
    group:
      template:
        - year
    disambiguate:
      names: true
      add-givenname: true
      year-suffix: true
  contributors:
    display-as-sort: all
    initialize-with: .
    shorten:
      min: 4
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      initialize-with: ". "
      shorten:
        min: 4
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
  template:
    - contributor: author
      form: short
      name-order: family-first
    - date: issued
      form: year
      prefix: ", "
    - variable: locator
      prefix: ", "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: .
      shorten:
        min: 4
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: never
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 1
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      wrap: quotes
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "in "
          name-order: given-first
          shorten:
            min: 4
            use-first: 1
        - title: parent-monograph
          emph: true
      prefix: ", in "
    - title: parent-serial
      emph: true
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides:
            article-magazine:
              suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        article-journal:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: url
  sort: author-date-title