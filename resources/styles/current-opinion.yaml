info:
  title: Current Opinion journals
  source:
    csl-id: http://www.zotero.org/styles/current-opinion
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: David M. Kaplan
      email: david.kaplan@ird.fr
    links:
    - href: http://www.zotero.org/styles/current-opinion
      rel: self
    - href: http://www.elsevier.com/journals/current-opinion-in-biotechnology/0958-1669/guide-for-authors
      rel: documentation
options:
  substitute: editor-translator-short
  processing: numeric
  contributors: numeric-large
  dates: long
  titles: journal-emphasis
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: ": "
    - items:
        - contributor: editor
          form: verb
          name-order: family-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - date: issued
      form: year
      prefix: "; "
      overrides:
        chapter:
          suppress: true
    - number: volume
      prefix: ", "
    - number: pages
      prefix: ":"