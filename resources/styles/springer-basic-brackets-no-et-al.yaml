info:
  title: Springer - Basic (numeric, brackets, no "et al.")
  description: Springer Numbered Style for the disciplines Medicine, Biomedicine, Life Sciences, Chemistry, Geosciences, Computer Science, Engineering, Economics. This style is based on Harvard style and recommendations of the Council of Biology Editors.
  source:
    csl-id: http://www.zotero.org/styles/springer-basic-brackets-no-et-al
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-basic-brackets-no-et-al
      rel: self
    - href: http://www.zotero.org/styles/springer-basic-author-date
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/instruct-authors-e.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  substitute:
    template:
      - editor
      - translator
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: short
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  bibliography:
    separator: ". "
  punctuation-in-quote: true
citation:
  template:
    - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ":"
      overrides:
        article-magazine:
          suppress: true
    - variable: publisher
    - number: pages
      prefix: ", pp "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: publisher-place
      prefix: ", "