info:
  title: Springer - Physics (author-date)
  description: This style is similar to American Physical Society (APS) and is used by a number of Springer publications.
  fields:
  - physics
  source:
    csl-id: http://www.zotero.org/styles/springer-physics-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-physics-author-date
      rel: self
    - href: http://www.zotero.org/styles/american-physics-society
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  substitute:
    contributor-role-form: long
    template:
      - editor
      - translator
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: author
          ascending: true
        - key: year
          ascending: true
    group:
      template:
        - author
        - year
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    initialize-with: ". "
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
    - contributor: author
      form: short
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
    - date: issued
      form: year
      prefix: ""
  wrap: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      initialize-with: ". "
      delimiter: ", "
      shorten:
        min: 99
        use-first: 99
  template:
    - contributor: author
      form: long
      overrides:
        personal_communication:
          prefix: "pp. "
      name-order: given-first
    - title: parent-monograph
      overrides:
        paper-conference:
          prefix: "in "
    - title: parent-serial
    - title: primary
      emph: true
      overrides:
        article-journal:
          suppress: true
        article-magazine:
          suppress: true
        article-newspaper:
          suppress: true
        chapter:
          suppress: true
        paper-conference:
          suppress: true
        dataset:
          suppress: true
        entry-encyclopedia:
          suppress: true
        interview:
          suppress: true
        personal_communication:
          suppress: true
        webpage:
          suppress: true
        broadcast:
          suppress: true
    - variable: publisher-place
    - number: volume
    - variable: publisher
      overrides:
        broadcast:
          suppress: true
        interview:
          suppress: true
        article-journal:
          suppress: true
        entry-encyclopedia:
          suppress: true
        dataset:
          suppress: true
    - date: issued
      form: year
      wrap: parentheses
    - number: pages
      prefix: ", "
      overrides:
        article-journal: {}
        article-magazine: {}
        paper-conference:
          prefix: ", pp. "
        chapter:
          prefix: ", pp. "
  type-templates:
    legal_case:
      - contributor: author
        form: long
        and: text
      - title: primary
        emph: true
      - variable: authority
      - number: edition
      - term: edition
        form: short
      - variable: publisher
      - variable: publisher-place
      - date: issued
        form: year
      - term: no-date
        form: short
      - number: pages
        label-form: short
        suppress: true
    patent:
      - contributor: author
        form: long
        and: text
      - number: number
      - date: issued
        form: year
      - term: no-date
        form: short
  sort: author-date-title
