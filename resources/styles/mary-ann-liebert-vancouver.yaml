info:
  title: Mary Ann Liebert - NLM/Vancouver
  source:
    csl-id: http://www.zotero.org/styles/mary-ann-liebert-vancouver
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
      email: obrienpat86@gmail.com
    links:
    - href: http://www.zotero.org/styles/mary-ann-liebert-vancouver
      rel: self
    - href: http://www.zotero.org/styles/mary-ann-liebert-harvard
      rel: template
    - href: https://home.liebertpub.com/authors/writing-guidelines/151
      rel: documentation
options:
  substitute: editor-short
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 4
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: numeric
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: never
      sort-separator: " "
  type-templates:
    legal-case:
      - title: primary
        prefix: "Anonymous. "
        suffix: ". "
      - date: issued
        form: year
    webpage:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - date: issued
        form: year
        suffix: ". "
      - variable: url
        prefix: "Available from: "
      - date: accessed
        form: full
        prefix: " [Last accessed: "
        suffix: "]"
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          name-order: family-first
          shorten:
            min: 4
            use-first: 3
        - title: parent-monograph
    - title: parent-serial
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - variable: publisher
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
      prefix: "; "
    - date: issued
      form: year
      overrides:
        article-journal:
          suppress: true
        chapter:
          suppress: true
        paper-conference:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - variable: doi
      prefix: "; "
    - variable: publisher-place
      prefix: ": "