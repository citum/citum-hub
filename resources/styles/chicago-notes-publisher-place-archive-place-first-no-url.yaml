info:
  title: Chicago Manual of Style 18th edition (notes without bibliography, place of publication substituted for publisher, archival references with place first, without URLs)
  description: Chicago-style source citations (with Bluebook for legal citations), notes system without bibliography, listing up to six authors in a full citation (CMOS18 13.23), chapter page numbers (CMOS18 14.8), displaying number of volumes (CMOS18 14.20), substituting place of publication for publisher name (CMOS18 14.31), archival references with place first (CMOS18 14.205), without URLs (CMOS18 13.6)
  fields:
  - anthropology
  - communications
  - geography
  - history
  - humanities
  - law
  - linguistics
  - literature
  - philosophy
  - science
  - sociology
  - theology
  source:
    csl-id: http://www.zotero.org/styles/chicago-notes-publisher-place-archive-place-first-no-url
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/chicago-notes-publisher-place-archive-place-first-no-url
      rel: self
    - href: http://www.zotero.org/styles/chicago-notes-bibliography
      rel: template
    - href: https://www.chicagomanualofstyle.org/
      rel: documentation
options:
  processing: note
  contributors:
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  page-range-format: chicago16
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
  ibid:
    note-start-text-case: capitalize-first
    suffix: ""
    delimiter: ", "
    template:
      - term: ibid
      - variable: locator
        suffix: .
  subsequent:
    options:
      contributors:
        name-form: family-only
    template:
      - contributor: author
        form: short
      - title: primary
        form: short
        prefix: ", "
      - variable: locator
        prefix: ", "
        overrides:
          book:
            suppress: false
          chapter:
            suppress: false
          article-journal:
            suppress: false
          default:
            suppress: true
  template:
    - contributor: author
      form: long
      name-order: given-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher-place
    - number: volume
      prefix: ") 2, no. "
    - contributor: editor
      form: verb
      name-order: given-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - number: pages
      prefix: ": "
    - number: number
      prefix: ", Patent "
      overrides:
        patent:
          suppress: false
        default:
          suppress: true
    - items:
        - date: issued
          form: month-day
          prefix: ", issued "
        - date: issued
          form: year
          prefix: ", "
      delimiter: none
      overrides:
        patent:
          suppress: false
        default:
          suppress: true
    - items:
        - date: issued
          form: month-day
        - date: issued
          form: year
          prefix: ", "
      delimiter: none
      prefix: ", "
      overrides:
        interview:
          suppress: false
        default:
          suppress: true
    - variable: medium
      prefix: ", "
      overrides:
        interview:
          suppress: false
        default:
          suppress: true
    - contributor: interviewer
      form: long
      prefix: ", interview by "
      overrides:
        interview:
          suppress: false
        default:
          suppress: true
  suffix: .
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  template: []
