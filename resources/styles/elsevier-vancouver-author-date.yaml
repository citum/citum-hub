info:
  title: Elsevier - NLM/Vancouver (name-year)
  description: A style for some Elsevier journals, resembles Vancouver style, but using author-date format
  source:
    csl-id: http://www.zotero.org/styles/elsevier-vancouver-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/elsevier-vancouver-author-date
      rel: self
    - href: http://www.zotero.org/styles/elsevier-vancouver
      rel: template
    - href: https://www.elsevier.com/journals/clinical-neurophysiology/1388-2457/guide-for-authors#68000
      rel: documentation
options:
  substitute:
    contributor-role-form: long
    template:
      - editor
      - translator
      - title
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: author
          ascending: true
        - key: year
          ascending: false
    group:
      template:
        - author
        - year
    disambiguate:
      names: false
      add-givenname: true
      year-suffix: true
  contributors: numeric-compact
  dates: long
  page-range-format: minimal
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
    - date: issued
      form: year
      prefix: ", "
    - variable: locator
      prefix: " "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors: numeric-compact
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - variable: publisher-place
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - variable: publisher
      prefix: ": "
    - date: issued
      form: year
      prefix: "; "
      overrides:
        article-journal:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - number: volume
    - number: issue
      prefix: ":"
      overrides:
        article-magazine:
          suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
      prefix: ":"
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
  sort:
    template:
      - key: author
        ascending: true
      - key: issued
        ascending: false