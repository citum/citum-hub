info:
  title: Taylor & Francis - Council of Science Editors (author-date)
  description: The Council of Science Editors style for T&F journals as per guidelines (version 2.0, 18 Jan 2018).
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/taylor-and-francis-council-of-science-editors-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/taylor-and-francis-council-of-science-editors-author-date
      rel: self
    - href: http://www.zotero.org/styles/cse-name-year
      rel: template
    - href: http://www.tandf.co.uk/journals/authors/style/reference/tf_CSE.pdf
      rel: documentation
options:
  processing: !custom
    sort:
      template:
        - key: author
        - key: year
    group:
      template: [author, year]
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  substitute: editor-translator-title-long
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 12
      use-first: 10
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: short
  bibliography:
    hanging-indent: false
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
  template:
    - items:
        - contributor: author
          form: short
          shorten:
            min: 3
            use-first: 1
            and-others: et-al
            delimiter-precedes-last: contextual
          and: text
        - date: issued
          form: year
      delimiter: space
    - variable: locator
  wrap: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 12
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: " "
    - title: primary
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - variable: publisher
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
      prefix: "; "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: publisher-place
    - variable: url