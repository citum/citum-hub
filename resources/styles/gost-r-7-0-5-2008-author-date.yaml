# yaml-language-server: $schema=https://bdarcus.github.io/csl26/schemas/style.json
info:
  id: gost-r-7-0-5-2008-author-date
  title: GOST R 7.0.5-2008 (Author-Date)
  description: >
    Russian bibliography standard GOST R 7.0.5-2008 demonstrating
    bibliography grouping by reference type with localized Russian headings.
  default-locale: ru-RU

options:
  processing:
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  multilingual:
    title-mode: combined
    name-mode: transliterated
    preferred-script: Cyrl

citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
    - contributor: author
      form: short
      shorten:
        min: 3
        use-first: 1
    - date: issued
      form: year
      prefix: ", "
    - variable: locator
      prefix: ", с. "
  wrap: brackets
  multi-cite-delimiter: "; "

bibliography:
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: ", "
    - title: primary
      prefix: " "
    - title: parent-monograph
    - title: parent-serial
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher-place
      prefix: " S. "
    - variable: publisher
    - number: volume
      prefix: ". Vol. "
    - number: issue
      prefix: ", № "
    - number: pages
      prefix: ". P. "
