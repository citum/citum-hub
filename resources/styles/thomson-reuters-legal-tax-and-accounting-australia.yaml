info:
  title: Thomson Reuters - Legal, Tax & Accounting Australia
  description: Style for a series of Thomson Reuters law publications for Australia
  fields:
  - law
  source:
    csl-id: http://www.zotero.org/styles/thomson-reuters-legal-tax-and-accounting-australia
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/thomson-reuters-legal-tax-and-accounting-australia
      rel: self
    - href: http://www.zotero.org/styles/australian-guide-to-legal-citation
      rel: template
    - href: https://forums.zotero.org/discussion/4841/new-australian-legal-citation-style/?Focus=20831#Comment_20831
      rel: documentation
options:
  substitute: editor-translator-short
  processing: note
  contributors:
    initialize-with: ""
    shorten:
      min: 20
      use-first: 19
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
  dates: long
citation:
  options:
    contributors:
      initialize-with: ""
      shorten:
        min: 20
        use-first: 19
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
  template:
    - contributor: author
      form: short
      name-order: family-first
    - title: primary
      prefix: ", "
      wrap: quotes
    - date: issued
      form: year
      wrap: parentheses
      overrides:
        entry-encyclopedia:
          suppress: true
        patent:
          suppress: true
    - number: volume
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - variable: url
  suffix: .
  delimiter: " "
  multi-cite-delimiter: "; "
  subsequent:
    template:
      - contributor: author
        form: short
        name-order: family-first
      - title: primary
        form: short
        prefix: ", "
        wrap: quotes
        overrides:
          book:
            emph: true
            quote: false
          legislation:
            emph: true
            quote: false
          manuscript:
            emph: true
            quote: false
          motion-picture:
            emph: true
            quote: false
          thesis:
            emph: true
            quote: false
          webpage:
            emph: true
            quote: false
      - variable: locator
        prefix: " at "
bibliography:
  template: []
