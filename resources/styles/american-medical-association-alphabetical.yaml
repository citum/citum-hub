info:
  title: AMA Manual of Style 11th edition (sorted alphabetically)
  description: 'AMA Manual of Style: A Guide for Authors and Editors (11th ed.), with alphabetically sorted bibliography.'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/american-medical-association-alphabetical
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      uri: https://orcid.org/0000-0001-5192-6856
    links:
    - href: http://www.zotero.org/styles/american-medical-association-alphabetical
      rel: self
    - href: http://www.zotero.org/styles/american-medical-association
      rel: template
    - href: https://academic.oup.com/amamanualofstyle
      rel: documentation
options:
  locators:
    strip-label-periods: true
  substitute:
    contributor-role-form: short
    template:
      - editor
  processing: numeric
  contributors:
    initialize-with: ""
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles: humanities
  page-range-format: expanded
  bibliography:
    separator: ". "
  punctuation-in-quote: true
citation:
  template:
    - items:
        - number: citation-number
        - variable: locator
          wrap: parentheses
      delimiter: none
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - date: issued
      form: year
      prefix: "; "
      overrides:
        chapter:
          suppress: true
        article-journal:
          suppress: true
        patent:
          suppress: true
        broadcast:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - number: pages
      prefix: ". 2013:"
    - variable: doi
    - variable: url
  sort: author-title-date