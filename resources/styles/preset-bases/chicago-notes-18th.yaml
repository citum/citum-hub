info:
  title: Chicago Manual of Style 18th edition (notes without bibliography)
  description: Chicago-style source citations (with Bluebook for legal citations), notes system without bibliography, listing up to six authors in a full citation (CMOS18 13.23), displaying number of volumes (CMOS18 14.20)
  fields:
  - anthropology
  - communications
  - geography
  - history
  - humanities
  - law
  - linguistics
  - literature
  - philosophy
  - science
  - sociology
  - theology
  source:
    csl-id: http://www.zotero.org/styles/chicago-notes
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/chicago-notes
      rel: self
    - href: http://www.zotero.org/styles/chicago-notes-bibliography
      rel: template
    - href: https://www.chicagomanualofstyle.org/
      rel: documentation
  short-name: "Chicago Notes"
  edition: "18th edition"
options:
  processing: note
  substitute: editor-translator-short
  contributors:
    and: text
    delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates: long
  titles: chicago
  page-range-format: chicago16
  punctuation-in-quote: true
citation:
  delimiter: ""
  ibid:
    note-start-text-case: capitalize-first
    suffix: ""
    delimiter: ", "
    template:
      - term: ibid
      - variable: locator
        suffix: .
  subsequent:
    options:
      contributors:
        name-form: family-only
    template:
      - contributor: author
        form: short
      - title: primary
        form: short
        prefix: ", "
      - variable: locator
        prefix: ", "
        overrides:
          book:
            suppress: false
          chapter:
            suppress: false
          article-journal:
            suppress: false
          default:
            suppress: true
  template:
