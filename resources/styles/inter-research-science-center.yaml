info:
  title: Inter-Research Science Center
  fields:
  - biology
  source:
    csl-id: http://www.zotero.org/styles/inter-research-science-center
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Stefania M Gorgopa
      email: stefania.gorgopa@gmail.com
    links:
    - href: http://www.zotero.org/styles/inter-research-science-center
      rel: self
    - href: http://www.zotero.org/styles/american-medical-association
      rel: template
    - href: https://www.int-res.com/journals/guidelines-for-authors/guidelines-authors/
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
      - title
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: year
          ascending: true
        - key: author
          ascending: true
    group:
      template:
        - year
        - author
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    periodical:
      emph: true
    serial:
      emph: true
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ". "
citation:
  options:
    contributors:
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
    - date: issued
      form: year
      prefix: " "
    - variable: locator
      prefix: " "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      delimiter-precedes-last: never
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          name-order: family-first
        - title: parent-monograph
    - title: parent-serial
    - number: volume
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - number: pages
      prefix: ":"
  sort: author-title-date