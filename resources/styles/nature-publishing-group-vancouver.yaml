info:
  title: Nature Publishing Group - NLM/Vancouver
  description: Superscript Vancouver style for some NPG journals, with et-al-min="7" and et-al-use-first="6"
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/nature-publishing-group-vancouver
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/nature-publishing-group-vancouver
      rel: self
    - href: http://www.zotero.org/styles/bmj
      rel: template
    - href: https://www.nature.com/tpj/authors-and-referees/gta
      rel: documentation
options:
  substitute: editor-short
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 7
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    delimiter-precedes-et-al: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: short
  titles: humanities
  bibliography:
    entry-suffix: .
    separator: ". "
citation:
  use-preset: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      delimiter-precedes-et-al: never
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - number: pages
      prefix: ": "
    - variable: publisher-place
      prefix: ": "
    - date: issued
      form: year
      prefix: ", "
      overrides:
        article-journal:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - variable: url
      prefix: .