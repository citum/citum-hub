info:
  title: Future Medicine journals
  fields:
  - medicine
  - biology
  source:
    csl-id: http://www.zotero.org/styles/future-medicine
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Bien
    links:
    - href: http://www.zotero.org/styles/future-medicine
      rel: self
    - href: http://www.zotero.org/styles/journal-of-applied-pharmaceutical-research
      rel: template
    - href: https://www.futuremedicine.com/authorguide/preparingyourarticle
      rel: documentation
    - href: https://www.futuremedicine.com/pb-assets/Future-Medicine-Author-Guidelines-1585216135307.pdf
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    and: none
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: numeric
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  bibliography:
    entry-suffix: .
    separator: ". "
citation:
  template:
    - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-et-al: never
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
      overrides:
        thesis:
          suppress: true
        patent:
          suppress: true
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides:
            article-magazine:
              suppress: true
    - contributor: editor
      form: verb
      name-order: family-first
    - number: pages
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
  type-templates:
    entry-encyclopedia:
      - number: citation-number
      - contributor: author
        form: long
        sort-separator: " "
        shorten:
          min: 7
          use-first: 3
          and-others: et-al
          delimiter-precedes-last: contextual
      - title: primary
      - variable: publisher
      - variable: publisher-place
      - date: issued
        form: year
        wrap: parentheses
    patent:
      - number: citation-number
      - contributor: author
        form: long
        sort-separator: " "
        shorten:
          min: 7
          use-first: 3
          and-others: et-al
          delimiter-precedes-last: contextual
      - number: number
      - date: issued
        form: year
        wrap: parentheses