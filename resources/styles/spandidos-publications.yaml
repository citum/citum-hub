info:
  title: Spandidos Publications
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/spandidos-publications
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/spandidos-publications
      rel: self
    - href: http://www.zotero.org/styles/avian-diseases
      rel: template
    - href: http://www.spandidos-publications.com/pages/info_for_authors
      rel: documentation
options:
  substitute:
    template:
      - editor
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 8
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 8
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: ": "
    - items:
        - contributor: editor
          form: verb
          name-order: family-first
        - title: parent-monograph
    - title: parent-serial
    - number: volume
    - variable: publisher
    - number: pages
      prefix: ", pp"
    - variable: publisher-place
      prefix: ", "
    - date: issued
      form: year
      prefix: ", "