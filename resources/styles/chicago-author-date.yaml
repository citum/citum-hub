# yaml-language-server: $schema=./citum.schema.json
preset: chicago-author-date-18th
info:
  title: Chicago Manual of Style 18th edition (author-date)
  description: Chicago-style source citations (with Bluebook for legal citations), author-date system
  fields:
  - anthropology
  - communications
  - geography
  - history
  - humanities
  - law
  - linguistics
  - literature
  - philosophy
  - science
  - sociology
  - theology
  source:
    csl-id: http://www.zotero.org/styles/chicago-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/chicago-author-date
      rel: self
    - href: http://www.zotero.org/styles/chicago-notes-bibliography
      rel: template
    - href: https://www.chicagomanualofstyle.org/
      rel: documentation
  short-name: "Chicago Author-Date"
  edition: "18th edition"
options:
  locators: note
  processing:
    disambiguate:
      names: true
      add-givenname: true
      year-suffix: true
    sort:
      template:
        - key: author
          ascending: true
        - key: year
          ascending: true
  contributors:
    and: text
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates: long
  titles:
    component: {}
    monograph:
      text-case: title
      emph: true
    container-monograph:
      text-case: title
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: chicago16
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
    - contributor: author
      form: short
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
    - date: issued
      form: year
      overrides:
        personal_communication:
          suppress: true
    - variable: locator
      prefix: ", "
  wrap: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
  groups:
    - id: primary-sources
      heading:
        localized:
          en-US: Primary Sources
          en: Primary Sources
          de: Primärquellen
          de-DE: Primärquellen
      selector:
        field:
          note: primary
    - id: archival
      heading:
        localized:
          en-US: Archival Sources
          en: Archival Sources
          de: Archivalische Quellen
          de-DE: Archivalische Quellen
      selector:
        field:
          note: archival
    - id: secondary
      heading:
        localized:
          en-US: Secondary Sources
          en: Secondary Sources
          de: Sekundärquellen
          de-DE: Sekundärquellen
      selector:
        not:
          field:
            note:
              - primary
              - archival
  type-templates:
    patent:
      - contributor: author
        form: long
        name-order: family-first
      - date: issued
        form: year
      - title: primary
      - items:
          - term: patent
            suffix: " "
          - number: number
          - date: issued
            form: full
            prefix: ", issued "
        prefix: ". "
        delimiter: none
    personal-communication: []
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - date: issued
      form: year
    - title: primary
      wrap: quotes
      overrides:
        book:
          wrap: none
        report:
          wrap: none
        thesis:
          wrap: none
        legal-case:
          emph: true
          wrap: none
        patent:
          wrap: none
        motion-picture:
          wrap: none
        broadcast:
          wrap: none
    - items:
        - contributor: editor
          form: verb
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - items:
        - number: volume
        - number: issue
          prefix: " ("
          suffix: ")"
          overrides:
            article-magazine:
              suppress: true
    - number: pages
      prefix: ": "
      overrides:
        book:
          suppress: true
        report:
          suppress: true
        thesis:
          suppress: true
        chapter:
          suppress: true
    - variable: publisher
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: url
