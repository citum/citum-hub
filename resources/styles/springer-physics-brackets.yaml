info:
  title: Springer - Physics (numeric, brackets)
  description: This style is similar to American Physical Society (APS) and is used by a number of Springer publications.
  fields:
  - physics
  source:
    csl-id: http://www.zotero.org/styles/springer-physics-brackets
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-physics-brackets
      rel: self
    - href: http://www.zotero.org/styles/american-physics-society
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  substitute: editor-translator-long
  processing: numeric
  contributors: physics-numeric
  dates: long
  titles: humanities
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      initialize-with: ". "
      delimiter: ", "
  template:
    - contributor: author
      form: long
      overrides:
        personal_communication:
          prefix: "pp. "
      name-order: given-first
    - title: parent-monograph
    - title: parent-serial
    - title: primary
      emph: true
      suppress: true
      overrides:
        book:
          suppress: false
        chapter:
          suppress: false
        paper-conference:
          suppress: false
    - number: volume
    - number: pages
    - variable: publisher
      prefix: " ("
      overrides:
        article-journal:
          suppress: true
    - variable: publisher-place
      overrides:
        article-journal:
          suppress: true
    - date: issued
      form: year
      wrap: parentheses
  type-templates:
    chapter:
      - contributor: author
        form: long
        name-order: given-first
      - term: in
      - title: parent-monograph
      - contributor: editor
        form: verb
      - variable: publisher
      - date: issued
        form: year
      - number: pages
        prefix: "pp. "
    report:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
      - variable: publisher
      - variable: publisher-place
      - date: issued
        form: year
        wrap: parentheses
    thesis:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
      - variable: genre
      - variable: publisher
      - date: issued
        form: year
    legal-case:
      - title: primary
      - date: issued
        form: year
        wrap: parentheses
      - number: pages
        prefix: ", p. "
    patent:
      - contributor: author
        form: long
        name-order: given-first
      - number: patent-number
      - date: issued
        form: year
        wrap: parentheses
    motion-picture:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
      - date: issued
        form: year
        wrap: parentheses
    broadcast:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
      - date: issued
        form: year
        wrap: parentheses