info:
  title: Springer - SocPsych (author-date)
  description: This style corresponds to 'Springer SocPsych' in the pdf document 'Key Style Points' at this url
  fields:
  - psychology
  source:
    csl-id: http://www.zotero.org/styles/springer-socpsych-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-socpsych-author-date
      rel: self
    - href: http://www.zotero.org/styles/apa
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/instruct-authors-e.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  processing: author-date
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
    overrides:
      report: []
  contributors:
    display-as-sort: all
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: never
    sort-separator: ", "
  dates: long
  titles: humanities
  bibliography:
    hanging-indent: true
    separator: ": "
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
  sort: author-date-title
  template:
    - items:
        - contributor: author
          form: short
          shorten:
            min: 3
            use-first: 1
            and-others: et-al
            delimiter-precedes-last: contextual
          and: text
        - date: issued
          form: year
      delimiter: space
    - variable: locator
  wrap: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  type-templates:
    legal-case:
      - title: primary
        suffix: "., "
      - number: volume
        suffix: " "
      - title: parent-serial
        suffix: " "
      - number: pages
      - items:
          - variable: authority
          - date: issued
            form: full
        delimiter: " "
        wrap: parentheses
        prefix: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - date: issued
      form: year
      prefix: " "
      overrides:
        interview:
          suppress: true
        patent:
          suppress: true
        article-newspaper:
          suppress: true
        broadcast:
          suppress: true
        personal_communication:
          suppress: true
        article-magazine:
          suppress: true
    - title: primary
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "In "
          name-order: given-first
        - title: parent-monograph
          emph: true
      prefix: ". In "
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
          wrap: parentheses
        paper-conference:
          prefix: "pp. "
          wrap: parentheses
    - variable: publisher-place
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: url