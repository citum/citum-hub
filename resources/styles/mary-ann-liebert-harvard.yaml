info:
  title: Mary Ann Liebert (author-date/Harvard)
  source:
    csl-id: http://www.zotero.org/styles/mary-ann-liebert-harvard
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
      email: obrienpat86@gmail.com
    links:
    - href: http://www.zotero.org/styles/mary-ann-liebert-harvard
      rel: self
    - href: http://www.zotero.org/styles/iawa-journal
      rel: template
    - href: https://home.liebertpub.com/authors/writing-guidelines/151
      rel: documentation
options:
  substitute: editor-short
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 4
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    and: text
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: numeric
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    processing:
      disambiguate:
        names: false
        add-givenname: false
        year-suffix: true
    contributors:
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
    - contributor: author
      form: short
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
    - date: issued
      form: year
      prefix: ", "
    - variable: locator
      prefix: ", "
  wrap: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: never
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 3
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          name-order: family-first
          shorten:
            min: 4
            use-first: 3
        - title: parent-monograph
    - title: parent-serial
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - variable: publisher
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
      prefix: "; 2006; "
    - variable: publisher-place
      prefix: ": "
    - date: issued
      form: year
      prefix: "; "
      overrides:
        chapter:
          suppress: true
        article-journal:
          suppress: true
        paper-conference:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - variable: doi
      prefix: "; "