info:
  title: Endocrine Press
  description: The American Medical Association style  with parentheses, bold authors, and no et-al
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/endocrine-press
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/endocrine-press
      rel: self
    - href: http://www.zotero.org/styles/american-medical-association
      rel: template
    - href: http://press.endocrine.org/page/authors#mozTocId713371
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles: humanities
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  template:
    - number: citation-number
  wrap: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - date: issued
      form: year
      overrides:
        article-journal:
          suppress: true
        chapter:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - number: pages
      prefix: ":"
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: url