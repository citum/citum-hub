info:
  title: Springer - Fachzeitschriften Medizin Psychologie (Deutsch)
  description: Springer Basic style (German, numeric, brackets, alphabetical) for Springer journals in medicine and psychology.
  fields:
  - medicine
  - psychology
  source:
    csl-id: http://www.zotero.org/styles/springer-fachzeitschriften-medizin-psychologie
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Philipp Zumstein
      uri: https://github.com/zuphilip
    links:
    - href: http://www.zotero.org/styles/springer-fachzeitschriften-medizin-psychologie
      rel: self
    - href: http://www.zotero.org/styles/springer-basic-brackets-no-et-al-alphabetical
      rel: template
    - href: http://static.springer.com/sgw/documents/135255/application/pdf/Musterbeitrag_Uebersichten_Leitthema_Schwerpunkt.pdf
      rel: documentation
    - href: http://static.springer.com/sgw/documents/69331/application/pdf/Leitfaden_Uebersichten_Leitthemen_Schwerpunkt.pdf
      rel: documentation
options:
  substitute:
    template:
      - editor
      - translator
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 5
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    delimiter-precedes-et-al: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
  bibliography:
    separator: ". "
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 5
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      delimiter-precedes-et-al: never
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 3
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ":"
      overrides:
        article-magazine:
          suppress: true
    - variable: publisher
    - number: pages
      prefix: ", pp "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: publisher-place
      prefix: ", "
  type-templates:
    webpage:
      - number: citation-number
        suffix: ". "
      - contributor: author
        form: long
        sort-separator: " "
        shorten:
          min: 5
          use-first: 3
          and-others: et-al
          delimiter-precedes-last: always
      - date: issued
        form: year
        wrap: parentheses
      - title: primary
        suffix: ". "
      - variable: url
        suffix: ". "
      - term: accessed
        form: long
        suffix: ": "
      - date: accessed
        form: year
  sort: author-date-title
