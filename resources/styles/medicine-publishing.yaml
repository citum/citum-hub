info:
  title: Medicine Publishing
  description: Vancouver style for all journals of The Medicine Publishing Collection.
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/medicine-publishing
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
    links:
    - href: http://www.zotero.org/styles/medicine-publishing
      rel: self
    - href: http://www.zotero.org/styles/the-british-journal-of-psychiatry
      rel: template
    - href: https://www.anaesthesiajournal.co.uk/content/authorinfo
      rel: documentation
options:
  substitute: editor-short
  processing: numeric
  contributors: numeric-tight
  dates: short
  titles: humanities
  page-range-format: minimal
  bibliography:
    entry-suffix: .
    separator: ". "
citation:
  use-preset: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - date: issued
      form: year
      overrides:
        article-journal:
          suppress: true
        article-magazine:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - number: volume
    - variable: url
    - number: pages
      prefix: ": "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "