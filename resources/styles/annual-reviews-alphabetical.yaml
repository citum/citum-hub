info:
  title: Annual Reviews (sorted alphabetically)
  source:
    csl-id: http://www.zotero.org/styles/annual-reviews-alphabetical
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Michael Berkowitz
      email: mberkowi@gmu.edu
    links:
    - href: http://www.zotero.org/styles/annual-reviews-alphabetical
      rel: self
    - href: http://www.zotero.org/styles/annual-reviews
      rel: template
    - href: http://www.annualreviews.org/page/authors/author-instructions/preparing/handbooks
      rel: documentation
options:
  substitute: editor-translator-short
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ""
    shorten:
      min: 7
      use-first: 5
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    demote-non-dropping-particle: never
    sort-separator: " "
  dates: short
  titles: humanities
  page-range-format: chicago
  bibliography:
    separator: ". "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: parentheses
  multi-cite-delimiter: ", "
bibliography:
  sort: author-date-title
  options:
    contributors:
      display-as-sort: all
      initialize-with: ""
      shorten:
        min: 7
        use-first: 5
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      sort-separator: " "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 5
    - date: issued
      form: year
      prefix: " "
    - title: primary
    - items:
        - number: volume
          overrides:
            legal-case:
              suppress: true
        - number: issue
          wrap: parentheses
          overrides:
            article-magazine:
              suppress: true
    - variable: publisher-place
    - items:
        - contributor: editor
          form: verb
          overrides:
            book:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
      overrides:
        film:
          suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
        legal-case:
          suppress: true
    - variable: publisher
  type-templates:
    patent:
      - number: citation-number
        suffix: ". "
      - contributor: author
        form: long
        sort-separator: " "
        shorten:
          min: 7
          use-first: 5
          and-others: et-al
          delimiter-precedes-last: contextual
      - date: issued
        form: year
      - title: primary
    entry-encyclopedia:
      - number: citation-number
        suffix: ". "
      - contributor: author
        form: long
        sort-separator: " "
        shorten:
          min: 7
          use-first: 5
          and-others: et-al
          delimiter-precedes-last: contextual
      - date: issued
        form: year
      - title: primary