info:
  title: American Geophysical Union
  description: The American Geophysical Union generic style
  fields:
  - geology
  source:
    csl-id: http://www.zotero.org/styles/american-geophysical-union
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      email: julian.onions@gmail.com
    - name: Simon Kornblith
      email: simon@simonster.com
    links:
    - href: http://www.zotero.org/styles/american-geophysical-union
      rel: self
    - href: http://www.zotero.org/styles/apa
      rel: template
    - href: http://publications.agu.org/brief-guide-agu-style-grammar/
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
    overrides:
      report: []
  contributors:
    display-as-sort: all
    initialize-with: ". "
    shorten:
      min: 8
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: numeric
  titles: humanities
  bibliography:
    hanging-indent: true
    separator: ". "
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  options:
    contributors:
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
    - contributor: author
      form: short
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      overrides:
        personal_communication:
          prefix: "pp. "
    - date: issued
      form: year
      prefix: ", "
    - variable: locator
      prefix: ", "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ". "
      shorten:
        min: 8
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - date: issued
      form: year
      prefix: " "
      overrides:
        interview:
          suppress: true
        patent:
          suppress: true
        article-newspaper:
          suppress: true
        broadcast:
          suppress: true
        personal_communication:
          suppress: true
        article-magazine:
          suppress: true
    - title: primary
      overrides:
        patent:
          suppress: true
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "In "
          name-order: given-first
        - title: parent-monograph
          emph: true
      prefix: ". In "
    - title: parent-serial
      emph: true
    - items:
        - number: volume
        - number: issue
          wrap: parentheses
          overrides: {}
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
          wrap: parentheses
        paper-conference:
          prefix: "pp. "
          wrap: parentheses
        entry-encyclopedia:
          prefix: "pp. "
      prefix: ", "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: url
  type-templates:
    interview:
      - contributor: author
        form: long
        name-order: family-first
      - date: issued
        form: year-month-day
        wrap: parentheses
        prefix: " "
      - title: primary
        prefix: ". "
      - variable: medium
        wrap: brackets
        prefix: " "
      - variable: url
        prefix: ". Retrieved from "
    patent:
      - contributor: author
        form: long
        name-order: family-first
        and: symbol
      - date: issued
        form: year-month-day
        wrap: parentheses
        prefix: " "
      - number: number
        prefix: ". "