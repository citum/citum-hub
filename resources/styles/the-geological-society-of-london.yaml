info:
  title: The Geological Society of London
  description: Parent style for the Journals and Books published by The Geological Society (London); details provided by publisher
  fields:
  - geology
  source:
    csl-id: http://www.zotero.org/styles/the-geological-society-of-london
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/the-geological-society-of-london
      rel: self
    - href: http://www.zotero.org/styles/antarctic-science
      rel: template
    - href: https://www.geolsoc.org.uk/~/media/Files/GSL/shared/pdfs/Publications/AuthorInfo_Text.pdf
      rel: documentation
options:
  substitute: editor-translator-short
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: year
          ascending: true
        - key: author
          ascending: true
    group:
      template:
        - year
        - author
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    initialize-with: .
    shorten:
      min: 8
      use-first: 2
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: never
    sort-separator: ", "
  dates: long
  titles: humanities
  page-range-format: expanded
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ", "
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
    - date: issued
      form: year
      prefix: " "
    - variable: locator
      prefix: " "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: .
      shorten:
        min: 8
        use-first: 2
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 2
    - date: issued
      form: year
      prefix: " "
    - title: primary
      prefix: ". "
    - items:
        - contributor: editor
          form: verb
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: issue
      overrides:
        article-magazine:
          suppress: true
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - number: pages
  type-templates:
    legal_case:
      - contributor: author
        form: long
        sort-separator: ", "
        shorten:
          min: 8
          use-first: 2
          and-others: et-al
          delimiter-precedes-last: never
        and: text
      - date: issued
        form: year
      - term: no-date
        form: short
      - title: primary
        overrides:
          graphic:
            emph: true
          thesis:
            emph: true
          legal_case:
            emph: true
          book:
            emph: true
          motion_picture:
            emph: true
          report:
            emph: true
          bill:
            emph: true
          song:
            emph: true
          map:
            emph: true
          legislation:
            emph: true
      - variable: authority
      - number: edition
      - term: edition
        form: short
        suffix: .
      - contributor: editor
        form: long
        delimiter: ", "
        sort-separator: ", "
        shorten:
          min: 8
          use-first: 2
          and-others: et-al
          delimiter-precedes-last: never
        and: text
      - variable: genre
      - number: number
        strong: true
      - title: parent-monograph
  sort: author-date-title