info:
  title: Springer - MathPhys (author-date)
  description: This style is used by a number of Springer publications.
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/springer-mathphys-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-mathphys-author-date
      rel: self
    - href: http://www.zotero.org/styles/springer-lecture-notes-in-computer-science
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  processing: !custom
    sort:
      template:
        - key: author
        - key: year
    group:
      template: [author, year]
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  substitute: editor-short
  contributors:
    display-as-sort: all
    initialize-with: .
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  bibliography:
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
  template:
    - items:
        - contributor: author
          form: short
          shorten:
            min: 3
            use-first: 1
            and-others: et-al
            delimiter-precedes-last: contextual
          and: text
        - date: issued
          form: year
      delimiter: space
    - variable: locator
  wrap: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: .
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: ": "
    - title: parent-monograph
    - title: parent-serial
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
    - variable: publisher-place
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: url
    - variable: publisher
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "