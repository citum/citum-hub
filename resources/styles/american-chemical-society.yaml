info:
  title: ACS Guide 2022 revision
  description: The American Chemical Society style
  fields:
  - chemistry
  source:
    csl-id: http://www.zotero.org/styles/american-chemical-society
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      email: julian.onions@gmail.com
    links:
    - href: http://www.zotero.org/styles/american-chemical-society
      rel: self
    - href: https://doi.org/10.1021/acsguide.40303
      rel: documentation
    - href: https://doi.org/10.1021/acsguide
      rel: documentation
options:
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ". "
    delimiter: "; "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  titles: humanities
  page-range-format: expanded
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  collapse: citation-number
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ". "
      delimiter: "; "
      delimiter-precedes-last: always
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
      prefix: "; "
    - variable: publisher-place
      prefix: ": "
    - date: issued
      form: year
      prefix: ", "
      overrides:
        chapter:
          suppress: true
        paper-conference:
          suppress: true
        entry-encyclopedia:
          suppress: true
    - items:
        - number: volume
        - number: issue
          overrides:
            article-magazine:
              suppress: true
      prefix: ", "
    - number: pages
      prefix: ", "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: url
  type-templates:
    patent:
      - number: citation-number
        wrap: parentheses
      - contributor: author
        form: long
        sort-separator: ", "
      - title: primary
        overrides:
          graphic:
            emph: true
          motion_picture:
            emph: true
          legislation:
            emph: true
          report:
            emph: true
          legal_case:
            emph: true
          song:
            emph: true
          bill:
            emph: true
          book:
            emph: true
      - date: issued
        form: full
