info:
  title: Multidisciplinary Digital Publishing Institute
  description: Style for the MDPI Open access journals
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/multidisciplinary-digital-publishing-institute
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/multidisciplinary-digital-publishing-institute
      rel: self
    - href: http://www.zotero.org/styles/american-chemical-society
      rel: template
    - href: http://www.mdpi.com/authors/references
      rel: documentation
options:
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: .
    delimiter: "; "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  titles: humanities
  page-range-format: expanded
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: .
      delimiter: "; "
      delimiter-precedes-last: always
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
      overrides:
        article-magazine:
          suppress: true
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
      prefix: "; "
    - date: issued
      form: year
      overrides:
        book:
          suppress: true
        chapter:
          suppress: true
        report:
          suppress: true
        paper-conference:
          suppress: true
        motion_picture:
          suppress: true
    - number: volume
    - number: issue
      overrides:
        article-magazine:
          suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
    - variable: doi
    - variable: publisher-place
  type-templates:
    webpage:
      - number: citation-number
        suffix: ". "
      - contributor: author
        form: long
        sort-separator: ", "
        shorten:
          min: 11
          use-first: 10
          and-others: et-al
          delimiter-precedes-last: always
      - title: primary
      - term: available-at
        form: long
      - variable: url
      - term: accessed
        form: long
      - date: accessed
        form: year