info:
  title: IEEE Reference Guide version 11.29.2023
  description: IEEE style as per the 2023 guidelines.
  fields:
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/ieee
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Michael Berkowitz
      email: mberkowi@gmu.edu
    links:
    - href: http://www.zotero.org/styles/ieee
      rel: self
    - href: https://journals.ieeeauthorcenter.ieee.org/your-role-in-article-production/ieee-editorial-style-manual/
      rel: documentation
  short-name: "IEEE"
options:
  substitute: editor-translator-short
  processing: numeric
  contributors:
    initialize-with: ". "
    demote-non-dropping-particle: sort-only
  dates: short
  titles: humanities
  bibliography:
    separator: ", "
  punctuation-in-quote: true
citation:
  template:
    - items:
        - number: citation-number
        - variable: locator
          prefix: ", "
      delimiter: none
      wrap: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      initialize-with: ". "
      delimiter-precedes-last: never
  template:
    - items:
        - number: citation-number
          wrap: brackets
        - contributor: author
          form: long
          and: text
          overrides:
            personal_communication:
              prefix: "pp. "
          name-order: given-first
          shorten:
            min: 8
            use-first: 1
      delimiter: ""
    - title: primary
      wrap: quotes
      overrides:
        book:
          wrap: none
        report:
          wrap: none
        thesis:
          emph: true
          wrap: none
        dataset:
          wrap: none
        motion-picture:
          wrap: none
        broadcast:
          wrap: none
        entry-encyclopedia:
          wrap: none
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: edition
    - number: volume
      prefix: ", vol. "
    - number: issue
      prefix: ", no. "
    - variable: publisher-place
      overrides:
        book:
          prefix: ". "
        thesis:
          prefix: ". "
    - variable: publisher
      prefix: ": "
    - number: pages
      overrides:
        article-journal:
          prefix: "pp. "
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
        entry-encyclopedia:
          prefix: "pp. "
    - date: issued
      form: year
      overrides:
        patent:
          suppress: true
    - variable: doi
      prefix: ", doi: "
    - variable: url
  type-templates:
    patent:
      - number: citation-number
        wrap: brackets
      - contributor: author
        form: long
        shorten:
          min: 7
          use-first: 1
          and-others: et-al
          delimiter-precedes-last: contextual
        and: text
      - title: primary
        quote: true
        wrap: quotes
        overrides:
          song:
            emph: true
            quote: false
          bill:
            emph: true
            quote: false
          graphic:
            emph: true
            quote: false
          motion_picture:
            emph: true
            quote: false
          legislation:
            emph: true
            quote: false
          legal_case:
            emph: true
            quote: false
          software:
            emph: true
            quote: false
          book:
            emph: true
            quote: false
          standard:
            emph: true
            quote: false
      - date: issued
        form: full