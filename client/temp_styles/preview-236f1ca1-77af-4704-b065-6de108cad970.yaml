version: ''
info:
  title: Springer - Humanities (numeric, brackets)
  id: http://www.zotero.org/styles/springer-humanities-brackets
  default-locale: en-US
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
  processing: numeric
  contributors:
    display-as-sort: first
    shorten:
      min: 11
      use-first: 7
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ', '
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ', '
  dates:
    month: long
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  bibliography:
    entry-suffix: .
    separator: '. '
  punctuation-in-quote: true
citation:
  template:
    - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ', '
bibliography:
  options:
    contributors:
      display-as-sort: first
      shorten:
        min: 11
        use-first: 7
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ', '
      delimiter-precedes-last: always
      sort-separator: ', '
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
    - items:
        - contributor: editor
          form: verb
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: issue
      prefix: ': '
      overrides:
        article-magazine:
          suppress: true
    - number: pages
      prefix: ': '
    - variable: publisher-place
    - variable: publisher
      prefix: ': '
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
