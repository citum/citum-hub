version: ""
info:
  title: "Taylor & Francis Journals Standard Reference Style Guide: Chicago author-date version 2.0"
  id: http://www.zotero.org/styles/taylor-and-francis-chicago-author-date
options:
  processing: author-date
  contributors:
    and: text
    display-as-sort: first
    demote-non-dropping-particle: display-and-sort
  dates: long
  titles: humanities
  page-range-format: expanded
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 4
        use-first: 1
  template:
    - items:
        - contributor: author
          form: short
          shorten:
            min: 4
            use-first: 1
            and-others: et-al
            delimiter-precedes-last: contextual
          and: text
        - date: issued
          form: year
      delimiter: space
    - variable: locator
      show-label: false
  wrap: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  type-templates:
    personal-communication: []
    patent:
      - contributor: author
        form: long
      - date: issued
        form: year
      - title: primary
      - items:
          - term: patent
            suffix: " "
          - number: number
          - date: issued
            form: full
            prefix: ", issued "
        delimiter: none
        prefix: ". "
  template:
    - contributor: author
      form: long
    - date: issued
      form: year
    - title: primary
      overrides:
        article-journal:
          wrap: quotes
        chapter:
          wrap: quotes
          suffix: "."
    - title: parent-monograph
      prefix: " In "
      overrides:
        article-journal:
          suppress: true
        book:
          suppress: true
    - contributor: editor
      form: long
      name-order: given-first
      prefix: ", edited by "
      overrides:
        article-journal:
          suppress: true
        book:
          suppress: true
    - title: parent-serial
      overrides:
        chapter:
          suppress: true
        book:
          suppress: true
    - number: volume
      prefix: " "
      overrides:
        chapter:
          suppress: true
        book:
          suppress: true
    - number: issue
      wrap: parentheses
      overrides:
        chapter:
          suppress: true
        book:
          suppress: true
    - number: pages
      prefix: ": "
      overrides:
        book:
          suppress: true
    - variable: publisher-place
      overrides:
        article-journal:
          suppress: true
    - variable: publisher
      prefix: ": "
      overrides:
        article-journal:
          suppress: true
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
      overrides:
        article-journal:
          suppress: true
        chapter:
          suppress: true
    - variable: doi
      prefix: ". https://doi.org/"
      suffix: "."
    - variable: url
      suffix: "."
