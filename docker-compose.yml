services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stylehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  citum:
    build:
      context: .
      dockerfile: Dockerfile.citum
    restart: always
    ports:
      - "3001:3000"
    environment:
      - RUST_LOG=info

volumes:
  postgres_data:
