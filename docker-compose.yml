services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stylehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  citum:
    image: ghcr.io/citum/citum-server:latest
    restart: always
    ports:
      - "3001:3000"

volumes:
  postgres_data:
