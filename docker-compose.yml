services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stylehub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  citum:
    build:
      context: .
      dockerfile: Dockerfile.citum
    restart: always
    ports:
      - "9000:3000"
    volumes:
      - ./client/temp_styles:/tmp/citum/styles
    environment:
      - RUST_LOG=info

volumes:
  postgres_data:
