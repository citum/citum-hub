<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>News - Citum Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #fdfbf7;
      color: #374151;
    }
    .glass-nav {
      background: rgba(253,251,247,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(42,148,214,0.12);
    }
    .nav-link {
      color: #6b7280;
      font-weight: 500;
      font-size: 0.92rem;
      padding: 6px 11px;
      border-radius: 9999px;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-link:hover, .nav-link[aria-current="page"] {
      color: #1f2937;
      background: rgba(42,148,214,0.08);
    }
    .notice {
      background: #ffffff;
      border: 1px solid rgba(42,148,214,0.15);
      border-left: 4px solid #2a94d6;
      border-radius: 8px;
      padding: 14px 16px;
      color: #374151;
      font-size: 0.94rem;
      line-height: 1.6;
    }
  </style>
</head>
<body class="min-h-screen">

  <header class="glass-nav sticky top-0 z-10">
    <div class="mx-auto max-w-[1100px] px-5 flex items-center justify-between gap-3 flex-wrap py-2 min-h-[64px]">
      <a href="https://citum.org" class="flex items-center gap-2 no-underline group">
          <div class="w-8 h-8 rounded flex items-center justify-center shrink-0" style="background:#2a94d6">
            <span class="text-white font-bold text-sm" style="font-family:'JetBrains Mono',monospace">C</span>
          </div>
          <span class="font-bold text-gray-900" style="font-family:'JetBrains Mono',monospace;font-size:1.05rem;letter-spacing:-0.01em">Citum</span>
        </a>
      <nav class="flex gap-1 flex-wrap justify-end" aria-label="Global">
        <a class="nav-link" href="https://citum.org">Home</a>
        <a class="nav-link" href="https://docs.citum.org">Docs</a>
        <a class="nav-link" href="https://citum.org/news" aria-current="page">News</a>
        <a class="nav-link" href="https://citum.org/demo">Demo</a>
        <a class="nav-link" href="https://hub.citum.org">Hub</a>
        <a class="nav-link" href="https://docs.citum.org/examples">Examples</a>
        <a class="nav-link" href="https://docs.citum.org/style-guide">Style Guide</a>
        <a class="nav-link" href="https://docs.citum.org/reports">Reports</a>
        <a class="nav-link" href="https://github.com/citum">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-[1100px] px-5 py-14 pb-20">
    <h1 class="font-bold leading-tight tracking-tight text-gray-900 mb-3" style="font-size:clamp(2rem,5vw,3rem)">Citum News</h1>
    <p class="text-[1.05rem] leading-relaxed max-w-[68ch] text-gray-500 mb-6">
      The Citum blog and announcements section is coming soon.
    </p>
    <div class="notice mb-6">
      We are migrating our documentation and news infrastructure. This page will soon host project updates, technical deep dives, and community news.
    </div>
  </main>
</body>
</html>
